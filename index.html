  .rt-marquee-track { display: flex; width: max-content; animation: rt-marquee 48s linear infinite; }

  .rt-marquee:hover .rt-marquee-track { animation-play-state: paused; }

  <script type="text/babel">
    function App() {
      const [booking, setBooking] = React.useState(false);
      const book = () => setBooking(true);
      React.useEffect(() => {
        const io = new IntersectionObserver((entries) => {
          entries.forEach((e) => { if (e.isIntersecting) { e.target.classList.add("rt-in"); io.unobserve(e.target); } });
        }, { threshold: 0.15 });
        document.querySelectorAll(".rt-reveal").forEach((el) => io.observe(el));
        return () => io.disconnect();
      }, []);
      return (
        <React.Fragment>
          <Header onBook={book} />
          <DotNav />
          <Hero onBook={book} />
          <About />
          <Works onBook={book} />
          <Services onBook={book} />
          <Benefits />
          <Testimonials />
          <Faq />
          <Cta onBook={book} />
          <Footer />
          <BookingModal open={booking} onClose={() => setBooking(false)} />
        </React.Fragment>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
